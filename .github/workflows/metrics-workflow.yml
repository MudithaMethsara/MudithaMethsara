name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"  # Every day at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # ⚠️ METRICS_TOKEN must be a personal access token (classic) with 'repo' and 'read:user' scopes
          # Create one at: https://github.com/settings/tokens
          # Then add it as a repository secret named METRICS_TOKEN

          user: RedWolf
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          config_order: base.header, isocalendar, languages, achievements, notable, lines, habits, stars

          # Theme and Colors
          config_padding: 0, 8
          config_output: svg
          extras_css: |
            :root {
              --color-canvas-default: #0D1117 !important;
              --color-canvas-subtle: #1e2327 !important;
              --color-fg-default: #ffffff !important;
              --color-fg-muted: #8b949e !important;
              --color-accent-fg: #00E5FF !important;
              --color-border-default: #30363d !important;
            }
            .header, .field, .plugin-title { color: #00E5FF !important; }
            svg { background: #0D1117 !important; border: 1px solid #FF1744; border-radius: 6px; }
          
          # Isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # Notable contributions
          plugin_notable: yes
          plugin_notable_from: organization

          # Lines of code changed
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

          # Habits
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          # Stars
          plugin_stars: yes
          plugin_stars_limit: 4

          # Output
          output_action: commit
          committer_branch: output
          committer_message: "chore: update metrics"
          filename: metrics.svg
